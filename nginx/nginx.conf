events {
    worker_connections 1024;
}

http {
    # Rate limiting
    limit_req_zone $binary_remote_addr zone=general:10m rate=30r/m;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    # Redirect HTTP → HTTPS
    server {
        listen 80;
        server_name ppatcher.com www.ppatcher.com;

        # Allow Let's Encrypt ACME challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS main server
    server {
        listen 443 ssl;
        http2 on;
        server_name ppatcher.com www.ppatcher.com;

        ssl_certificate     /etc/letsencrypt/live/ppatcher.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/ppatcher.com/privkey.pem;

        # Modern SSL settings
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;

        # Security headers
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options    "nosniff" always;
        add_header X-Frame-Options           "SAMEORIGIN" always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

        # Gzip
        gzip on;
        gzip_types text/plain text/css application/json application/javascript text/xml text/javascript;

        # Static assets — long cache
        location /static/ {
            proxy_pass http://webapp:8080;
            proxy_set_header Host $host;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # Main app
        location / {
            limit_req zone=general burst=20 nodelay;

            proxy_pass http://webapp:8080;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
            proxy_connect_timeout 10s;

            proxy_buffering    on;
            proxy_buffer_size  4k;
            proxy_buffers      8 4k;
        }
    }
}
