events { worker_connections 1024; }
http {
    server {
        listen 80;
        server_name ppatcher.com www.ppatcher.com;
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }
        location / {
            return 200 'bootstrapping ssl...';
            add_header Content-Type text/plain;
        }
    }
}
