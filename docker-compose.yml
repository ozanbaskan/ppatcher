services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ppatcher
      POSTGRES_PASSWORD: ppatcher
      POSTGRES_DB: ppatcher
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ppatcher"]
      interval: 5s
      timeout: 3s
      retries: 5

  webapp:
    build:
      context: .
      dockerfile: webapp/Dockerfile
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:8080"
    env_file:
      - ./webapp/.env
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
